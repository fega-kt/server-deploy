version: "3.9"

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    command: --http-enabled
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - docker_ui_net

  nginx:
    image: nginx:alpine
    container_name: docker-ui-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - docker_ui_net
    depends_on:
      - portainer

networks:
  docker_ui_net:
    driver: bridge

volumes:
  portainer_data:
