groups:
  - name: zhizhu
    rules:
      - alert: BackendDown
        expr: up{job="zhizhu-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "zhizhu-backend has been unreachable for more than 1 minute."

      - alert: BackendHighErrorRate
        expr: >
          (sum(rate(http_requests_total{job="zhizhu-backend", status_code=~"5.."}[5m])) or vector(0))
          / sum(rate(http_requests_total{job="zhizhu-backend"}[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Backend 5xx error rate high"
          description: "5xx error rate is above 5% for 2 minutes."

      - alert: BackendHighLatency
        expr: >
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="zhizhu-backend"}[5m])) by (le)
          ) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Backend p95 latency high"
          description: "p95 response time has been above 2s for 2 minutes."
