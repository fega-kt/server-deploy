services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: zhizhu-onlyoffice
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/vault-init.sh"]
    command: ["/app/ds/run-document-server.sh"]
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_SECRET_PATH: secret/onlyoffice
      EXAMPLE_ENABLED: ${EXAMPLE_ENABLED:-false}
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./vault-init.sh:/vault-init.sh:ro
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_lib:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - zhizhu_net

volumes:
  onlyoffice_logs:
  onlyoffice_data:
  onlyoffice_lib:
  onlyoffice_db:

networks:
  zhizhu_net:
    external: true
