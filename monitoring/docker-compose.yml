services:
  prometheus:
    image: prom/prometheus:latest
    container_name: zhizhu-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - monitoring_internal

  node-exporter:
    image: prom/node-exporter:latest
    container_name: zhizhu-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring_internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: zhizhu-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    networks:
      - monitoring_internal

  nginx-exporter-web:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: zhizhu-nginx-exporter-web
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://zhizhu-web:8081/stub_status
    networks:
      - zhizhu_net
      - monitoring_internal

  nginx-exporter-backend:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: zhizhu-nginx-exporter-backend
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://zhizhu-backend-proxy:80/stub_status
    networks:
      - zhizhu_net
      - monitoring_internal

  grafana:
    image: grafana/grafana:latest
    container_name: zhizhu-grafana
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/vault-init.sh"]
    command: ["/run.sh"]
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST}
      GF_SMTP_USER: ${GF_SMTP_USER}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Grafana}
    volumes:
      - ./vault-init.sh:/vault-init.sh:ro
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    networks:
      - zhizhu_net
      - monitoring_internal
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  zhizhu_net:
    external: true
  monitoring_internal:
    driver: bridge
