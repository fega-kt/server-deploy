services:
  backend:
    image: ${APP_IMAGE:-ghcr.io/fega-kt/backend-mikroorm:latest}
    container_name: zhizhu-backend
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "dist/main.js"]
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    networks:
      - zhizhu_net

networks:
  zhizhu_net:
    external: true
